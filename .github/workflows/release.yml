name: Release UnityPackage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build UnityPackage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unitypackage
        run: bash scripts/build-unitypackage.sh

      - name: Build VPM package
        run: bash scripts/build-vpm-package.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YUMESORA_MergeSponsor
          path: |
            dist/YUMESORA_MergeSponsor.unitypackage
            dist/com.yumesora.merge-sponsor-*.zip

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_assets=(dist/YUMESORA_MergeSponsor.unitypackage dist/com.yumesora.merge-sponsor-*.zip)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${release_assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${release_assets[@]}" \
              --title "YUMESORA Merge Sponsor $TAG_NAME" \
              --generate-notes
          fi
