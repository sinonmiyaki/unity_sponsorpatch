name: Release UnityPackage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build UnityPackage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unitypackage
        run: bash scripts/build-unitypackage.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YUMESORA_MergeSponsor
          path: dist/YUMESORA_MergeSponsor.unitypackage

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_PATH: dist/YUMESORA_MergeSponsor.unitypackage
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$PACKAGE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_PATH" \
              --title "YUMESORA Merge Sponsor $TAG_NAME" \
              --generate-notes
          fi
